version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data  # Сохраняем БД на хост-машине
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
    command: uvicorn app:app --host 0.0.0.0 --port 8000